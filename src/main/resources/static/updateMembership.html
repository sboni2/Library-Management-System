<!DOCTYPE html>
<html>
<head>
    <title>Update Membership</title>

    <style>
        body { font-family: Arial; }

        .topbar {
            display: flex;
            justify-content: space-between;
            margin: 10px 40px;
        }

        .link {
            color: blue;
            text-decoration: underline;
            cursor: pointer;
        }

        .container {
            display: flex;
            width: 90%;
            margin: auto;
        }

        .left {
            width: 30%;
            padding: 10px;
        }

        .left div {
            margin: 10px 0;
            cursor: pointer;
        }

        .right {
            width: 70%;
            border: 2px solid black;
            padding: 20px;
        }

        .row {
            display: flex;
            margin: 10px 0;
        }

        .row label {
            width: 200px;
        }

        input {
            width: 200px;
        }

        button {
            padding: 10px 20px;
            margin: 20px 10px 0 0;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
        }

        .footer {
            text-align: right;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
    <span class="link" onclick="goChart()">Chart</span>
    <span class="link" onclick="goHome()">Home</span>
</div>

<div class="container">

    <!-- LEFT MENU -->
    <div class="left">
        <div>Membership</div>
        <div class="link" onclick="go('addMembership.html')">Add</div>
        <div class="link" onclick="go('updateMembership.html')">Update</div>

        <div>Books/Movies</div>
        <div class="link" onclick="go('addBook.html')">Add</div>
        <div class="link" onclick="go('updateBook.html')">Update</div>

        <div>User Management</div>
        <div class="link" onclick="go('addUser.html')">Add</div>
        <div class="link" onclick="go('updateUser.html')">Update</div>
    </div>

    <!-- FORM -->
    <div class="right">

        <h3>Update Membership</h3>

        <div class="row">
            <label>Membership Number</label>
            <input id="memberId">
        </div>

        <div class="row">
            <label>Start Date</label>
            <input type="date" id="startDate">
        </div>

        <div class="row">
            <label>End Date</label>
            <input type="date" id="endDate">
        </div>

        <div class="row">
            <label>Membership Extension</label>
            <div>
                <input type="radio" name="action" value="6" checked> 6 Months<br>
                <input type="radio" name="action" value="12"> 1 Year<br>
                <input type="radio" name="action" value="24"> 2 Years<br>
                <input type="radio" name="action" value="remove"> Remove Membership
            </div>
        </div>

        <button onclick="cancel()">Cancel</button>
        <button onclick="submitForm()">Confirm</button>

        <div class="footer">
            <span class="link" onclick="logout()">Log Out</span>
        </div>

    </div>

</div>

<script>

// Submit logic
function submitForm(){

    let id = document.getElementById("memberId").value;
    let start = document.getElementById("startDate").value;
    let end = document.getElementById("endDate").value;
    let action = document.querySelector('input[name="action"]:checked');

    if(!id || !start || !end || !action){
        alert("All fields are required");
        return;
    }

    if(action.value === "remove"){
        alert("Membership Removed Successfully");
    } else {
        alert("Membership Extended by " + action.value + " months");
    }

    // Optional backend
    fetch("/updateMember", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            id, start, end, action: action.value
        })
    });

    window.location.href = "maintenance.html";
}

// Navigation
function go(page){
    window.location.href = page;
}

function goHome(){
    window.location.href = "home.html";
}

function cancel(){
    window.location.href = "maintenance.html";
}

function logout(){
    localStorage.clear();
    window.location.href = "index.html";
}

function goChart(){
    alert("Chart not required");
}

</script>

</body>
</html>
