<!DOCTYPE html>
<html>
<head>
    <title>Logged Out</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            margin: 10px 40px;
        }

        .link {
            color: blue;
            text-decoration: underline;
            cursor: pointer;
        }

        .container {
            margin-top: 100px;
        }

        h2 {
            color: #333;
        }

        button {
            padding: 10px 20px;
            margin-top: 20px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
    <span class="link" onclick="goChart()">Chart</span>
    <span class="link" onclick="goLogin()">Login</span>
</div>

<!-- MESSAGE -->
<div class="container">
    <h2>You have successfully logged out.</h2>
    <button onclick="goLogin()">Login Again</button>
</div>

<script>

// Clear session immediately when page loads
localStorage.clear();

// Navigation
function goLogin(){
    window.location.href = "index.html";
}

function goChart(){
    alert("Chart not required");
}

</script>

</body>
</html>
