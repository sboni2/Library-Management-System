<!DOCTYPE html>
<html>
<head>
    <title>Return Book</title>

    <style>
        body { font-family: Arial; }

        .topbar {
            display: flex;
            justify-content: space-between;
            margin: 10px 40px;
        }

        .link {
            color: blue;
            text-decoration: underline;
            cursor: pointer;
        }

        .container {
            display: flex;
            width: 90%;
            margin: auto;
            border: 2px solid black;
            padding: 20px;
        }

        .left { width: 30%; }
        .left div { margin: 10px 0; }

        .right { width: 70%; }

        .row {
            display: flex;
            margin: 10px 0;
        }

        .row label { width: 200px; }

        input, select {
            width: 200px;
        }

        textarea {
            width: 200px;
        }

        button {
            padding: 10px 20px;
            margin: 20px 10px 0 0;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
    <span class="link" onclick="goChart()">Chart</span>
    <h2>Transactions</h2>
    <span class="link" onclick="goHome()">Home</span>
</div>

<div class="container">

    <!-- LEFT MENU -->
    <div class="left">
        <div class="link" onclick="go('viewBooks.html')">Is book available?</div>
        <div class="link" onclick="go('issueBook.html')">Issue book?</div>
        <div class="link" onclick="go('returnBook.html')">Return book?</div>
        <div class="link" onclick="go('payFine.html')">Pay Fine?</div>
    </div>

    <!-- RIGHT FORM -->
    <div class="right">

        <h3>Return Book</h3>

        <div class="row">
            <label>Enter Book Name</label>
            <select id="bookSelect" onchange="fillDetails()"></select>
        </div>

        <div class="row">
            <label>Enter Author</label>
            <input id="author" readonly>
        </div>

        <div class="row">
            <label>Serial No</label>
            <select id="serial"></select>
        </div>

        <div class="row">
            <label>Issue Date</label>
            <input id="issueDate" readonly>
        </div>

        <div class="row">
            <label>Return Date</label>
            <input type="date" id="returnDate">
        </div>

        <div class="row">
            <label>Remarks</label>
            <textarea id="remarks"></textarea>
        </div>

        <button onclick="cancel()">Cancel</button>
        <button onclick="confirmReturn()">Confirm</button>

    </div>

</div>

<div style="text-align:right; margin:20px;">
    <span class="link" onclick="logout()">Log Out</span>
</div>

<script>

// Sample issued data (you can later connect to backend)
let issuedBooks = [
    { id: 1, title: "Java", author: "James", issueDate: "2026-04-01" },
    { id: 2, title: "Python", author: "Guido", issueDate: "2026-04-05" }
];

window.onload = function(){
    let titles = [...new Set(issuedBooks.map(b => b.title))];

    titles.forEach(t => {
        bookSelect.innerHTML += `<option>${t}</option>`;
    });

    fillDetails();
};

// Fill author + serial + issue date
function fillDetails(){

    let selected = bookSelect.value;

    let filtered = issuedBooks.filter(b => b.title === selected);

    serial.innerHTML = "";

    filtered.forEach(b => {
        serial.innerHTML += `<option value="${b.id}">${b.id}</option>`;
    });

    if(filtered.length > 0){
        author.value = filtered[0].author;
        issueDate.value = filtered[0].issueDate;
    }
}

// Confirm return
function confirmReturn(){

    let book = bookSelect.value;
    let serialNo = serial.value;
    let returnDate = document.getElementById("returnDate").value;

    if(!book || !serialNo || !returnDate){
        alert("Please fill required fields");
        return;
    }

    fetch("/return", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            bookId: serialNo,
            returnDate: returnDate
        })
    })
    .then(res => res.text())
    .then(() => {
        window.location.href = "payFine.html";
    });
}

// Navigation
function go(page){ window.location.href = page; }

function goHome(){
    let role = localStorage.getItem("role");
    if(role === "admin"){
        window.location.href = "home.html";
    } else {
        window.location.href = "userHome.html";
    }
}

function cancel(){
    window.location.href = "transactions.html";
}

function logout(){
    localStorage.clear();
    window.location.href = "index.html";
}

function goChart(){
    alert("Chart not required");
}

</script>

</body>
</html>
