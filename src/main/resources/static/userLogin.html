<!DOCTYPE html>
<html>
<head>
    <title>User Login</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            margin: 10px 50px;
        }

        .link {
            color: blue;
            text-decoration: underline;
            cursor: pointer;
        }

        .container {
            width: 500px;
            margin: 80px auto;
            border: 2px solid black;
            padding: 30px;
            background: white;
            text-align: center;
        }

        .row {
            display: flex;
            margin: 15px 0;
        }

        .row label {
            width: 120px;
        }

        .row input {
            flex: 1;
            border: 2px solid black;
            padding: 5px;
        }

        button {
            padding: 10px 25px;
            margin: 10px;
            border: none;
            color: white;
            background: linear-gradient(#6ea8dc, #4a90e2);
            border-radius: 8px;
            cursor: pointer;
        }

        #msg {
            color: red;
        }
    </style>
</head>

<body>

<div class="topbar">
    <span class="link" onclick="goChart()">Chart</span>
    <span class="link" onclick="goBack()">Back</span>
</div>

<div class="container">

    <h2>Library Management System</h2>

    <div class="row">
        <label>User ID</label>
        <input id="username">
    </div>

    <div class="row">
        <label>Password</label>
        <input id="password" type="password">
    </div>

    <button onclick="cancel()">Cancel</button>
    <button onclick="login()">Login</button>

    <p id="msg"></p>

</div>

<script>

function goChart(){
    alert("Chart not required");
}

function goBack(){
    window.location.href = "index.html";
}

function cancel(){
    username.value = "";
    password.value = "";
}

function login(){

    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(!user || !pass){
        document.getElementById("msg").innerText = "Enter all fields";
        return;
    }

    fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: user,
            password: pass
        })
    })
    .then(res => res.text())
    .then(result => {

        if(result === "admin"){
            localStorage.setItem("role","admin");
            window.location.href = "home.html";
        }
        else if(result === "user"){
            localStorage.setItem("role","user");
            window.location.href = "userHome.html";
        }
        else{
            document.getElementById("msg").innerText = "Invalid login";
        }

    });
}

</script>

</body>
</html>
