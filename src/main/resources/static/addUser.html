<!DOCTYPE html>
<html>
<head>
    <title>User Management</title>

    <style>
        body { font-family: Arial; }

        .topbar {
            display: flex;
            justify-content: space-between;
            margin: 10px 40px;
        }

        .link {
            color: blue;
            text-decoration: underline;
            cursor: pointer;
        }

        .container {
            display: flex;
            width: 90%;
            margin: auto;
        }

        .left {
            width: 30%;
            padding: 10px;
        }

        .left div {
            margin: 10px 0;
            cursor: pointer;
        }

        .right {
            width: 70%;
            border: 2px solid black;
            padding: 20px;
        }

        .row {
            display: flex;
            margin: 10px 0;
        }

        .row label {
            width: 200px;
        }

        input {
            width: 200px;
        }

        button {
            padding: 10px 20px;
            margin: 20px 10px 0 0;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
        }

        .footer {
            text-align: right;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
    <span class="link" onclick="goChart()">Chart</span>
    <span class="link" onclick="goHome()">Home</span>
</div>

<div class="container">

    <!-- LEFT MENU -->
    <div class="left">
        <div>Membership</div>
        <div class="link" onclick="go('addMembership.html')">Add</div>
        <div class="link" onclick="go('updateMembership.html')">Update</div>

        <div>Books/Movies</div>
        <div class="link" onclick="go('addBook.html')">Add</div>
        <div class="link" onclick="go('updateBook.html')">Update</div>

        <div>User Management</div>
        <div class="link" onclick="go('addUser.html')">Add</div>
        <div class="link" onclick="go('updateUser.html')">Update</div>
    </div>

    <!-- FORM -->
    <div class="right">

        <h3>User Management</h3>

        <div class="row">
            <label>User Type</label>
            <div>
                <input type="radio" name="userType" value="new" checked> New User
                <input type="radio" name="userType" value="existing"> Existing User
            </div>
        </div>

        <div class="row">
            <label>Name</label>
            <input id="name">
        </div>

        <div class="row">
            <label>Status</label>
            <input type="checkbox" id="active"> Active
        </div>

        <div class="row">
            <label>Admin</label>
            <input type="checkbox" id="admin"> Admin
        </div>

        <button onclick="cancel()">Cancel</button>
        <button onclick="submitForm()">Confirm</button>

        <div class="footer">
            <span class="link" onclick="logout()">Log Out</span>
        </div>

    </div>

</div>

<script>

// Submit
function submitForm(){

    let name = document.getElementById("name").value;
    let active = document.getElementById("active").checked;
    let admin = document.getElementById("admin").checked;
    let userType = document.querySelector('input[name="userType"]:checked');

    if(!name || !userType){
        alert("Name is required");
        return;
    }

    fetch("/addUser", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            name,
            active,
            admin,
            userType: userType.value
        })
    });

    alert("User saved successfully");
    window.location.href = "maintenance.html";
}

// Navigation
function go(page){
    window.location.href = page;
}

function goHome(){
    window.location.href = "home.html";
}

function cancel(){
    window.location.href = "maintenance.html";
}

function logout(){
    localStorage.clear();
    window.location.href = "index.html";
}

function goChart(){
    alert("Chart not required");
}

</script>

</body>
</html>
